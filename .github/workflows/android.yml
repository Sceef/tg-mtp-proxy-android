name: Android CI

# Убирает предупреждения Node 20; см. https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: JVM tests and debug APK
        working-directory: android
        run: ./gradlew :core:test :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v6
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: app-debug
          path: artifact

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
